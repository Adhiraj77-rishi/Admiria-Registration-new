<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADMIRIA 1.0 — QR Code</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
–c1: #ff6b35;
–c2: #f7c59f;
–bg: #0d0d0d;
–surface: #161616;
–border: rgba(255,107,53,0.25);
–text: #f5f5f5;
–muted: #888;
}

body {
font-family: ‘Poppins’, sans-serif;
background: var(–bg);
color: var(–text);
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 40px 16px;
overflow-x: hidden;
}

.bg-mesh {
position: fixed; inset: 0; z-index: 0;
background:
radial-gradient(ellipse 70% 50% at 10% 10%, rgba(255,107,53,0.15) 0%, transparent 60%),
radial-gradient(ellipse 60% 40% at 90% 90%, rgba(0,78,137,0.18) 0%, transparent 60%);
}

.wrap {
position: relative; z-index: 1;
width: 100%;
max-width: 500px;
text-align: center;
}

.school-tag {
display: inline-flex;
align-items: center;
gap: 8px;
background: rgba(255,107,53,0.12);
border: 1px solid rgba(255,107,53,0.3);
color: var(–c1);
font-size: 10px;
font-weight: 600;
letter-spacing: 3px;
text-transform: uppercase;
padding: 5px 16px;
border-radius: 100px;
margin-bottom: 16px;
}

.big-title {
font-family: ‘Bebas Neue’, sans-serif;
font-size: clamp(4rem, 15vw, 7rem);
line-height: 0.9;
letter-spacing: 4px;
background: linear-gradient(135deg, #ff6b35, #f7c59f, #fff, #ff6b35);
background-size: 200% 200%;
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
animation: shimmer 4s ease infinite;
}
@keyframes shimmer { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }

.sub-title {
font-family: ‘Bebas Neue’, sans-serif;
letter-spacing: 8px;
font-size: 1rem;
color: rgba(247,197,159,0.5);
margin-bottom: 36px;
}

/* URL input card */
.url-card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 24px;
padding: 32px;
margin-bottom: 20px;
box-shadow: 0 40px 80px rgba(0,0,0,0.5);
animation: up 0.8s cubic-bezier(.16,1,.3,1) both;
}
@keyframes up { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }

.url-label {
font-size: 11px;
font-weight: 600;
letter-spacing: 2px;
color: rgba(247,197,159,0.7);
text-transform: uppercase;
text-align: left;
margin-bottom: 10px;
}

.url-row {
display: flex;
gap: 10px;
}

.url-input {
flex: 1;
background: rgba(255,255,255,0.05);
border: 1.5px solid rgba(255,255,255,0.1);
border-radius: 12px;
padding: 13px 18px;
color: var(–text);
font-family: ‘Poppins’, sans-serif;
font-size: 13px;
outline: none;
transition: all 0.25s;
}
.url-input:focus {
border-color: var(–c1);
background: rgba(255,107,53,0.06);
box-shadow: 0 0 0 4px rgba(255,107,53,0.1);
}
.url-input::placeholder { color: rgba(136,136,136,0.5); font-size: 12px; }

.gen-btn {
padding: 13px 22px;
background: linear-gradient(135deg, #ff6b35, #e8502a);
border: none;
border-radius: 12px;
color: #fff;
font-family: ‘Poppins’, sans-serif;
font-weight: 700;
font-size: 13px;
letter-spacing: 1px;
cursor: pointer;
transition: all 0.25s;
box-shadow: 0 6px 20px rgba(255,107,53,0.3);
white-space: nowrap;
}
.gen-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(255,107,53,0.45); }

/* QR display card */
.qr-card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 24px;
padding: 36px 32px;
display: none;
animation: up 0.6s cubic-bezier(.16,1,.3,1) both;
box-shadow: 0 40px 80px rgba(0,0,0,0.5);
}

.scan-badge {
display: inline-flex;
align-items: center;
gap: 8px;
background: rgba(255,107,53,0.12);
border: 1px solid rgba(255,107,53,0.25);
color: var(–c1);
font-size: 11px;
font-weight: 600;
letter-spacing: 2px;
text-transform: uppercase;
padding: 5px 16px;
border-radius: 100px;
margin-bottom: 20px;
}

.qr-frame {
display: inline-block;
padding: 20px;
background: #fff;
border-radius: 20px;
margin-bottom: 20px;
box-shadow: 0 12px 40px rgba(0,0,0,0.4);
position: relative;
}

/* Corner accents on QR */
.qr-frame::before, .qr-frame::after {
content: ‘’;
position: absolute;
width: 24px; height: 24px;
}
.qr-frame::before {
top: -2px; left: -2px;
border-top: 3px solid var(–c1);
border-left: 3px solid var(–c1);
border-radius: 4px 0 0 0;
}
.qr-frame::after {
bottom: -2px; right: -2px;
border-bottom: 3px solid var(–c1);
border-right: 3px solid var(–c1);
border-radius: 0 0 4px 0;
}

.qr-hint {
color: var(–muted);
font-size: 13px;
line-height: 1.6;
margin-bottom: 8px;
}

.url-display {
background: rgba(255,255,255,0.04);
border: 1px solid rgba(255,255,255,0.08);
border-radius: 10px;
padding: 10px 14px;
font-size: 11px;
color: var(–muted);
word-break: break-all;
margin-bottom: 24px;
text-align: left;
}

.btn-row {
display: flex;
gap: 12px;
}
.action-btn {
flex: 1;
padding: 13px;
border: none;
border-radius: 12px;
font-family: ‘Poppins’, sans-serif;
font-size: 13px;
font-weight: 700;
cursor: pointer;
transition: all 0.25s;
letter-spacing: 0.5px;
}
.btn-dl {
background: linear-gradient(135deg, #ff6b35, #e8502a);
color: #fff;
box-shadow: 0 6px 20px rgba(255,107,53,0.3);
}
.btn-print {
background: rgba(255,255,255,0.07);
border: 1px solid rgba(255,255,255,0.12);
color: var(–text);
}
.action-btn:hover { transform: translateY(-2px); }

/* Placeholder */
.qr-placeholder {
text-align: center;
padding: 30px 0;
animation: up 0.8s cubic-bezier(.16,1,.3,1) 0.2s both;
}
.placeholder-icon { font-size: 64px; margin-bottom: 16px; opacity: 0.5; }
.placeholder-text { color: var(–muted); font-size: 14px; line-height: 1.7; }

@media(max-width:460px) {
.url-card,.qr-card { padding: 24px 18px; }
.url-row { flex-direction: column; }
.gen-btn { width: 100%; }
.btn-row { flex-direction: column; }
}
</style>

</head>
<body>

<div class="bg-mesh"></div>

<div class="wrap">
  <div class="school-tag">◆ Mother Care School · Nadiad ◆</div>
  <div class="big-title">ADMIRIA</div>
  <div class="sub-title">QR &nbsp; CODE &nbsp; GENERATOR</div>

  <!-- URL input -->

  <div class="url-card">
    <div class="url-label">📎 Paste Registration Form URL</div>
    <div class="url-row">
      <input class="url-input" type="text" id="urlIn" placeholder="https://your-hosted-form-url.com/ADMIRIA-registration.html" />
      <button class="gen-btn" onclick="generate()">Generate QR</button>
    </div>
  </div>

  <!-- QR result -->

  <div class="qr-card" id="qrCard">
    <div class="scan-badge">📱 Scan to Register</div>
    <div class="qr-frame">
      <div id="qrcode"></div>
    </div>
    <div class="qr-hint">Students can scan this with any phone camera — no app needed.</div>
    <div class="url-display" id="urlShow"></div>
    <div class="btn-row">
      <button class="action-btn btn-dl" onclick="download()">⬇ Download PNG</button>
      <button class="action-btn btn-print" onclick="printIt()">🖨 Print QR</button>
    </div>
  </div>

  <!-- Placeholder before generation -->

  <div class="qr-placeholder" id="placeholder">
    <div class="placeholder-icon">📲</div>
    <div class="placeholder-text">
      Host the registration form online,<br>
      paste the URL above and tap <strong style="color:var(--c1)">Generate QR</strong><br>
      to create a scannable code for the event.
    </div>
  </div>
</div>

<script>
let generated = false;

function generate() {
  const url = document.getElementById('urlIn').value.trim();
  if (!url) { alert('Please paste a URL first.'); return; }
  if (!url.startsWith('http')) { alert('URL must start with http:// or https://'); return; }

  document.getElementById('placeholder').style.display = 'none';

  const qrDiv = document.getElementById('qrcode');
  qrDiv.innerHTML = '';

  new QRCode(qrDiv, {
    text: url,
    width: 240,
    height: 240,
    colorDark: '#0d0d0d',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.H
  });

  document.getElementById('urlShow').textContent = url;
  document.getElementById('qrCard').style.display = 'block';
  generated = true;
}

function download() {
  setTimeout(() => {
    const canvas = document.querySelector('#qrcode canvas');
    if (!canvas) { alert('Please generate QR first.'); return; }
    const a = document.createElement('a');
    a.download = 'ADMIRIA_1.0_QR.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  }, 100);
}

function printIt() {
  const canvas = document.querySelector('#qrcode canvas');
  if (!canvas) { alert('Please generate QR first.'); return; }
  const w = window.open('', '_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>ADMIRIA 1.0 QR Code</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;600&display=swap');
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Poppins',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#fff;padding:40px}
    .logo{font-family:'Bebas Neue',sans-serif;font-size:72px;letter-spacing:4px;color:#ff6b35;line-height:1}
    .ver{font-family:'Bebas Neue',sans-serif;letter-spacing:8px;font-size:18px;color:#aaa;margin-bottom:8px}
    .school{font-size:13px;color:#888;letter-spacing:2px;text-transform:uppercase;margin-bottom:32px}
    img{border-radius:16px;border:3px solid #ff6b35;padding:8px}
    .hint{margin-top:20px;font-size:13px;color:#888;text-align:center;line-height:1.7}
    .url{margin-top:10px;font-size:10px;color:#bbb;word-break:break-all;max-width:300px;text-align:center}
  </style></head><body>

  <div class="logo">ADMIRIA</div>
  <div class="ver">1 . 0</div>
  <div class="school">Mother Care School · Nadiad</div>
  <img src="${canvas.toDataURL('image/png')}" width="260"/>
  <div class="hint">📱 Scan with your phone camera<br>to open the registration form</div>
  <div class="url">${document.getElementById('urlShow').textContent}</div>
  </body></html>`);
  w.document.close();
  setTimeout(() => w.print(), 600);
}
</script>
</body>
</html>
